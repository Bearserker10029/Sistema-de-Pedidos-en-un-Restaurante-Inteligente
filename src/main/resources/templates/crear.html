<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crear pedido</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
  <div class="container py-4">
    <h2>Nuevo pedido</h2>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{/crear}">
      <div class="mb-3">
        <label for="cliente" class="form-label">Nombre del cliente</label>
        <input name="cliente" id="cliente" type="text" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="servicio" class="form-label">Tipo de servicio</label>
        <select name="servicio" id="servicio" class="form-select" required>
          <option value="">Seleccionar</option>
          <option value="para llevar">Para llevar</option>
          <option value="en mesa">En mesa</option>
        </select>
      </div>

      <h5>Selecciona uno o mas platos</h5>
      <div class="table-responsive mb-3">
        <table class="table table-sm table-bordered">
          <thead>
            <tr>
              <th></th>
              <th>Plato</th>
              <th>Tipo</th>
              <th>Precio</th>
              <th>Tiempo</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="plato : ${platos}">
              <td><input class="form-check-input" type="checkbox" name="dishIds" th:value="${plato.id}"></td>
              <td th:text="${plato.nombre}"></td>
              <td th:text="${plato.tipo}"></td>
              <td>S/ <span th:text="${plato.precio}"></span></td>
              <td><span th:text="${plato.tiempoPreparacion}"></span> min</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex gap-2">
        <a th:href="@{/platos}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">Crear pedido</button>
      </div>
    </form>
  </div>
</body>

</html>
