<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial de pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <h2 class="pb-2 pt-2 border-bottom">Historial de pedidos</h2>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <a class="btn btn-primary mt-4 mb-4" th:href="@{/crear}">Crear pedido</a>
        <a class="btn btn-outline-secondary mt-4 mb-4" th:href="@{/platos}">Ver menu</a>
        <table class="table table-sm">
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Servicio</th>
                <th>Tiempo estimado</th>
                <th>Estado</th>
                <th></th>
            </tr>
            <tr th:each="pedido : ${orders}">
                <td th:text="${pedido.orderId}"></td>
                <td th:text="${pedido.cliente}"></td>
                <td th:text="${pedido.servicio}"></td>
                <td><span th:text="${pedido.tiempoEstimadoTotal}"></span> min</td>
                <td th:text="${pedido.estado}"></td>
                <td><a class="btn btn-outline-primary btn-sm" th:href="@{'/resumen?id=' + ${pedido.orderId}}">Ver
                        resumen</a></td>
            </tr>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
