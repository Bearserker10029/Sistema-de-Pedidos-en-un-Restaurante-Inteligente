<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resumen del pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <div class="container py-4">
        <h2>Resumen del pedido</h2>

        <div class="alert alert-success" th:if="${ok}" th:text="${ok}"></div>

        <div class="card mb-3">
            <div class="card-body">
                <p><strong>ID:</strong> <span th:text="${order.orderId}"></span></p>
                <p><strong>Cliente:</strong> <span th:text="${order.cliente}"></span></p>
                <p><strong>Servicio:</strong> <span th:text="${order.servicio}"></span></p>
                <p><strong>Estado:</strong> <span class="badge bg-primary" th:text="${order.estado}"></span></p>
                <p><strong>Tiempo total estimado:</strong> <span th:text="${order.tiempoEstimadoTotal}"></span> min</p>
            </div>
        </div>

        <h5>Platos seleccionados</h5>
        <ul class="list-group mb-3">
            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="plato : ${order.platos}">
                <span>
                    <strong th:text="${plato.nombre}"></strong>
                    (<span th:text="${plato.tipo}"></span>)
                </span>
                <span>
                    S/ <span th:text="${plato.precio}"></span> -
                    <span th:text="${plato.tiempoPreparacion}"></span> min
                </span>
            </li>
        </ul>

        <div class="d-flex gap-2">
            <form method="post" th:if="${puedeAvanzar}" th:action="@{/pedido/avanzar}">
                <input type="hidden" name="id" th:value="${order.orderId}">
                <button class="btn btn-success" type="submit">Avanzar estado</button>
            </form>
            <a th:href="@{/historial}" class="btn btn-outline-secondary">Ver historial</a>
            <a th:href="@{/crear}" class="btn btn-primary">Nuevo pedido</a>
        </div>
    </div>
</body>

</html>
