<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Platos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
              crossorigin="anonymous">
    </head>
    <body>
        <div class="container mt-3">
            <div class="col-md-4 offset-md-4">

                <a th:href="@{'/crear'}" class="btn btn-danger">Crear Pedido</a>
                <a th:href="@{'/historial'}" class="btn btn-danger">Ir al historial</a>
                <h2 class="pb-2 border-bottom">Platos</h2>
                <table class="table">
                    <thead>

                            <th>Plato</th>
                            <th>tipo</th>
                            <th>Precio</th>
                            <th>Preparacion</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="plato : ${platos}">
                            <td th:text="${plato.nombre}"></td>
                            <td th:text="${plato.tipo}"></td>
                            <td th:text="${plato.precio}"></td>
                            <td th:text="${plato.tiempo}"></td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
                crossorigin="anonymous"></script>
    </body>
</html>
