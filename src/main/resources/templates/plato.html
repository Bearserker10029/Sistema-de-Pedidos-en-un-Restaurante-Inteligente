<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu de platos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <div class="container py-4">
        <h2 class="pb-2 border-bottom">Menu</h2>
        <div class="d-flex gap-2 mb-3">
            <a th:href="@{/crear}" class="btn btn-primary">Crear pedido</a>
            <a th:href="@{/historial}" class="btn btn-outline-secondary">Ver historial</a>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Plato</th>
                    <th>Tipo</th>
                    <th>Precio</th>
                    <th>Tiempo de preparacion</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="plato : ${platos}">
                    <td th:text="${plato.nombre}"></td>
                    <td th:text="${plato.tipo}"></td>
                    <td>S/ <span th:text="${plato.precio}"></span></td>
                    <td><span th:text="${plato.tiempoPreparacion}"></span> min</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
